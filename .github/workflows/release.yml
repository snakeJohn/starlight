name: Build and Release Starlight

on:
  push:
    branches:
      - "**"

jobs:
  validate:
    name: Validate
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Ensure build did not rewrite tracked sources
        shell: pwsh
        run: |
          git diff --exit-code
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build modified tracked source files; holiday/data must be updated via npm run fetch:holidays and committed."
            exit 1
          }

      - name: Validate plugin
        run: npm run validate

  release:
    name: Publish release
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # Pin privileged actions to reviewed commit SHAs (v4/v2 tags as of plan date).
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Stamp release version
        run: npm run version:stamp

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Ensure build did not rewrite tracked sources
        shell: pwsh
        run: |
          # version:stamp intentionally dirties package/plugin metadata before release.
          # Fail only if build rewrote other tracked sources (e.g. holiday data).
          git diff --exit-code -- . `
            ":(exclude)package.json" `
            ":(exclude)package-lock.json" `
            ":(exclude)plugin.json"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build modified tracked source files outside release metadata."
            exit 1
          }

      - name: Validate plugin
        run: npm run validate

      - name: Sync release manifest
        id: release_manifest
        run: npm run release:manifest

      - name: Commit release metadata
        id: release_commit
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json plugin.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            "sha=$(git rev-parse HEAD)" >> $env:GITHUB_OUTPUT
            exit 0
          }
          git commit -m "chore: update release metadata ${{ steps.release_manifest.outputs.release_version }} [skip ci]"
          git push
          "sha=$(git rev-parse HEAD)" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: starlight-${{ steps.release_manifest.outputs.release_version }}.zip
          path: ${{ steps.release_manifest.outputs.release_zip_path }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.release_manifest.outputs.release_version }}
          name: Starlight ${{ steps.release_manifest.outputs.release_version }}
          target_commitish: ${{ steps.release_commit.outputs.sha }}
          files: ${{ steps.release_manifest.outputs.release_zip_path }}
          fail_on_unmatched_files: true
          body: |
            Automated release for commit `${{ steps.release_commit.outputs.sha }}`.

            - Release version: `${{ steps.release_manifest.outputs.release_version }}`
            - Asset: `starlight-${{ steps.release_manifest.outputs.release_version }}.zip`
            - entryHash: `${{ steps.release_manifest.outputs.entry_hash }}`
            - zipHash: `${{ steps.release_manifest.outputs.zip_hash }}`
