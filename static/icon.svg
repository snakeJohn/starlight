<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 圆形浅色容器：对齐默认插件图标的圆底样式 -->
  <circle cx="128" cy="128" r="128" fill="#E3EEFF"/>

  <!-- 音箱主体：单色实心 -->
  <rect x="84" y="60" width="88" height="136" rx="20" ry="20" fill="#3B6FE0"/>

  <!-- 顶部指示灯：用容器色镂空 -->
  <circle cx="128" cy="96" r="9" fill="#E3EEFF"/>

  <!-- 扬声器外环：容器色镂空形成圆环 -->
  <circle cx="128" cy="152" r="26" fill="#E3EEFF"/>
  <!-- 扬声器中心实心 -->
  <circle cx="128" cy="152" r="12" fill="#3B6FE0"/>
  <!-- 扬声器中心高光点 -->
  <circle cx="128" cy="152" r="4" fill="#E3EEFF"/>
</svg>

