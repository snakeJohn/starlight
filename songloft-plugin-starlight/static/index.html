<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Starlight Songloft</title>
    <link rel="icon" type="image/svg+xml" href="static/icon.svg">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="side-rail" id="sideRail"></aside>
        <main class="workspace">
            <header class="status-strip" id="statusStrip"></header>

            <section class="tab-panel active" id="tab-search">
                <div class="panel-heading">
                    <div>
                        <p class="eyebrow">Music Bridge</p>
                        <h1>搜索</h1>
                    </div>
                    <div class="status-pill" data-role="source-count">0 个音源</div>
                </div>

                <form class="control-grid compact" data-role="music-search-form">
                    <label>
                        <span>平台</span>
                        <select name="source_id" data-role="platform-select"></select>
                    </label>
                    <label>
                        <span>音质</span>
                        <select name="quality" data-role="quality-select">
                            <option value="320k">320k</option>
                            <option value="128k">128k</option>
                            <option value="flac">flac</option>
                            <option value="flac24bit">flac24bit</option>
                        </select>
                    </label>
                    <label class="wide-field">
                        <span>关键词</span>
                        <input name="keyword" type="search" placeholder="歌曲、歌手或专辑" autocomplete="off">
                    </label>
                    <button class="primary-button" type="submit">搜索</button>
                </form>

                <div class="surface-section">
                    <div class="section-bar">
                        <h2>结果</h2>
                        <span data-role="search-total">0</span>
                    </div>
                    <div class="list-stack" data-role="search-results"></div>
                </div>
            </section>

            <section class="tab-panel" id="tab-speaker">
                <div class="panel-heading">
                    <div>
                        <p class="eyebrow">MIoT</p>
                        <h1>音箱</h1>
                    </div>
                    <button class="ghost-button" type="button" data-action="refresh-speaker">刷新</button>
                </div>

                <div class="two-column">
                    <section class="surface-section">
                        <div class="section-bar">
                            <h2>账号</h2>
                            <span data-role="auth-summary">未加载</span>
                        </div>
                        <div class="segmented" role="tablist">
                            <button class="active" type="button" data-auth-mode="qrcode">扫码</button>
                            <button type="button" data-auth-mode="password">密码</button>
                            <button type="button" data-auth-mode="token">Token</button>
                        </div>

                        <div class="auth-panel active" data-auth-panel="qrcode">
                            <div class="inline-actions">
                                <button class="primary-button" type="button" data-action="qr-start">获取二维码</button>
                                <button class="ghost-button" type="button" data-action="qr-poll">轮询</button>
                            </div>
                            <div class="qr-box" data-role="qr-box">
                                <img data-role="qr-image" alt="二维码">
                                <a data-role="qr-link" target="_blank" rel="noreferrer"></a>
                                <span data-role="qr-status">等待生成</span>
                            </div>
                        </div>

                        <form class="auth-panel control-stack" data-auth-panel="password" data-role="password-login-form">
                            <label>
                                <span>账号 ID</span>
                                <input name="account_id" autocomplete="username" placeholder="可留空">
                            </label>
                            <label>
                                <span>用户名</span>
                                <input name="username" autocomplete="username" required>
                            </label>
                            <label>
                                <span>密码</span>
                                <input name="password" type="password" autocomplete="current-password" required>
                            </label>
                            <button class="primary-button" type="submit">登录</button>
                        </form>

                        <form class="auth-panel control-stack" data-auth-panel="token" data-role="token-login-form">
                            <label>
                                <span>账号 ID</span>
                                <input name="account_id" placeholder="可留空">
                            </label>
                            <label>
                                <span>User ID</span>
                                <input name="user_id" required>
                            </label>
                            <label>
                                <span>Pass Token</span>
                                <input name="pass_token" required>
                            </label>
                            <button class="primary-button" type="submit">保存 Token</button>
                        </form>

                        <div class="list-stack tight" data-role="account-list"></div>
                    </section>

                    <section class="surface-section">
                        <div class="section-bar">
                            <h2>设备</h2>
                            <button class="ghost-button" type="button" data-action="refresh-devices">刷新</button>
                        </div>
                        <div class="control-grid">
                            <label>
                                <span>账号</span>
                                <select data-role="account-select"></select>
                            </label>
                            <label>
                                <span>设备</span>
                                <select data-role="device-select"></select>
                            </label>
                        </div>
                        <div class="list-stack tight" data-role="device-list"></div>
                    </section>
                </div>

                <section class="surface-section">
                    <div class="section-bar">
                        <h2>播放控制</h2>
                        <span data-role="speaker-message">就绪</span>
                    </div>
                    <div class="control-grid">
                        <form class="inline-form" data-role="volume-form">
                            <label>
                                <span>音量</span>
                                <input name="volume" type="range" min="0" max="100" value="35">
                            </label>
                            <output data-role="volume-value">35</output>
                            <button class="primary-button" type="submit">设置</button>
                        </form>
                        <form class="inline-form" data-role="url-play-form">
                            <label class="wide-field">
                                <span>URL</span>
                                <input name="url" type="url" placeholder="https://">
                            </label>
                            <button class="primary-button" type="submit">播放</button>
                        </form>
                    </div>
                    <div class="player-actions">
                        <button class="icon-button" type="button" data-action="player-previous" title="上一首" aria-label="上一首">Prev</button>
                        <button class="icon-button" type="button" data-action="player-stop" title="停止" aria-label="停止">Stop</button>
                        <button class="icon-button" type="button" data-action="player-next" title="下一首" aria-label="下一首">Next</button>
                        <select data-role="play-mode-select" aria-label="播放模式">
                            <option value="order">顺序</option>
                            <option value="repeat">循环</option>
                            <option value="random">随机</option>
                            <option value="single">单曲</option>
                        </select>
                        <button class="ghost-button" type="button" data-action="player-mode">应用模式</button>
                    </div>
                </section>
            </section>

            <section class="tab-panel" id="tab-songlists">
                <div class="panel-heading">
                    <div>
                        <p class="eyebrow">Discovery</p>
                        <h1>歌单</h1>
                    </div>
                </div>
                <form class="control-grid compact" data-role="songlist-form">
                    <label>
                        <span>平台</span>
                        <select name="source_id" data-role="songlist-platform"></select>
                    </label>
                    <label class="wide-field">
                        <span>关键词</span>
                        <input name="keyword" type="search" placeholder="歌单名" autocomplete="off">
                    </label>
                    <button class="primary-button" type="submit" name="mode" value="search">搜索</button>
                    <button class="ghost-button" type="submit" name="mode" value="recommended">推荐</button>
                </form>
                <div class="split-view">
                    <section class="surface-section">
                        <div class="section-bar">
                            <h2>列表</h2>
                            <span data-role="songlist-total">0</span>
                        </div>
                        <div class="list-stack" data-role="songlist-list"></div>
                    </section>
                    <section class="surface-section">
                        <div class="section-bar">
                            <h2 data-role="songlist-title">详情</h2>
                        </div>
                        <div class="list-stack" data-role="songlist-detail"></div>
                    </section>
                </div>
            </section>

            <section class="tab-panel" id="tab-rankings">
                <div class="panel-heading">
                    <div>
                        <p class="eyebrow">Discovery</p>
                        <h1>排行榜</h1>
                    </div>
                </div>
                <div class="control-grid compact">
                    <label>
                        <span>平台</span>
                        <select data-role="ranking-platform"></select>
                    </label>
                    <button class="primary-button" type="button" data-action="load-rankings">加载榜单</button>
                </div>
                <div class="split-view">
                    <section class="surface-section">
                        <div class="section-bar">
                            <h2>榜单</h2>
                        </div>
                        <div class="list-stack" data-role="ranking-list"></div>
                    </section>
                    <section class="surface-section">
                        <div class="section-bar">
                            <h2 data-role="ranking-title">歌曲</h2>
                        </div>
                        <div class="list-stack" data-role="ranking-songs"></div>
                    </section>
                </div>
            </section>

            <section class="tab-panel" id="tab-sources">
                <div class="panel-heading">
                    <div>
                        <p class="eyebrow">LX Runtime</p>
                        <h1>音源</h1>
                    </div>
                    <label class="file-button">
                        <input type="file" data-role="source-file" accept=".js,.zip,application/javascript,application/zip">
                        <span>导入文件</span>
                    </label>
                </div>
                <section class="surface-section">
                    <div class="section-bar">
                        <h2>已导入</h2>
                        <button class="ghost-button" type="button" data-action="refresh-sources">刷新</button>
                    </div>
                    <div class="list-stack" data-role="source-list"></div>
                </section>
            </section>

            <section class="tab-panel" id="tab-automation">
                <div class="panel-heading">
                    <div>
                        <p class="eyebrow">Automation</p>
                        <h1>自动化</h1>
                    </div>
                    <button class="ghost-button" type="button" data-action="refresh-automation">刷新</button>
                </div>
                <div class="two-column">
                    <section class="surface-section">
                        <div class="section-bar">
                            <h2>语音口令</h2>
                            <span data-role="voice-enabled">未加载</span>
                        </div>
                        <textarea data-role="voice-json" spellcheck="false"></textarea>
                        <div class="inline-actions">
                            <button class="primary-button" type="button" data-action="save-voice">保存口令</button>
                            <button class="ghost-button" type="button" data-action="load-voice">重新加载</button>
                        </div>
                    </section>
                    <section class="surface-section">
                        <div class="section-bar">
                            <h2>索引</h2>
                            <span data-role="indexing-state">未加载</span>
                        </div>
                        <div class="metric-grid">
                            <div><span>歌单</span><strong data-role="index-playlists">0</strong></div>
                            <div><span>歌曲</span><strong data-role="index-songs">0</strong></div>
                            <div><span>时间</span><strong data-role="index-updated">-</strong></div>
                        </div>
                        <button class="primary-button" type="button" data-action="refresh-index">刷新索引</button>
                    </section>
                </div>

                <section class="surface-section">
                    <div class="section-bar">
                        <h2>定时任务</h2>
                        <span data-role="schedules-enabled">未加载</span>
                    </div>
                    <form class="control-grid" data-role="schedule-form">
                        <label>
                            <span>ID</span>
                            <input name="id" placeholder="新增可留空">
                        </label>
                        <label>
                            <span>名称</span>
                            <input name="name" required>
                        </label>
                        <label>
                            <span>动作</span>
                            <select name="action">
                                <option value="play_playlist">播放歌单</option>
                                <option value="play_playlist_from">播放歌单起点</option>
                                <option value="set_volume">设置音量</option>
                                <option value="set_play_mode">设置模式</option>
                                <option value="stop">停止</option>
                            </select>
                        </label>
                        <label>
                            <span>类型</span>
                            <select name="schedule_type">
                                <option value="weekly">每周</option>
                                <option value="monthly">每月</option>
                            </select>
                        </label>
                        <label>
                            <span>时间</span>
                            <input name="time" type="time" value="08:00">
                        </label>
                        <label>
                            <span>星期</span>
                            <input name="weekdays" placeholder="1,2,3">
                        </label>
                        <label>
                            <span>日期</span>
                            <input name="monthdays" placeholder="1,15">
                        </label>
                        <label>
                            <span>歌单</span>
                            <input name="playlist_name">
                        </label>
                        <label>
                            <span>音量</span>
                            <input name="volume" type="number" min="0" max="100">
                        </label>
                        <label>
                            <span>模式</span>
                            <select name="play_mode">
                                <option value="">保持</option>
                                <option value="order">顺序</option>
                                <option value="repeat">循环</option>
                                <option value="random">随机</option>
                                <option value="single">单曲</option>
                            </select>
                        </label>
                        <label class="toggle-line">
                            <input name="enabled" type="checkbox" checked>
                            <span>启用</span>
                        </label>
                        <label class="toggle-line">
                            <input name="all_managed" type="checkbox" checked>
                            <span>所有托管设备</span>
                        </label>
                        <button class="primary-button" type="submit">保存任务</button>
                    </form>
                    <div class="list-stack" data-role="schedule-list"></div>
                </section>
            </section>

            <section class="tab-panel" id="tab-settings">
                <div class="panel-heading">
                    <div>
                        <p class="eyebrow">System</p>
                        <h1>设置</h1>
                    </div>
                    <button class="ghost-button" type="button" data-action="load-config">加载</button>
                </div>
                <form class="surface-section settings-form" data-role="config-form">
                    <div class="control-grid">
                        <label class="wide-field">
                            <span>服务器地址</span>
                            <input name="server_host" placeholder="http://192.168.x.x:58091">
                        </label>
                        <label>
                            <span>时区</span>
                            <input name="timezone" placeholder="Asia/Shanghai">
                        </label>
                        <label class="wide-field">
                            <span>外部搜索 URL</span>
                            <input name="external_search_url" type="url" placeholder="https://">
                        </label>
                        <label class="wide-field">
                            <span>外部搜索 Token</span>
                            <input name="external_search_token">
                        </label>
                        <label>
                            <span>额外型号</span>
                            <input name="extra_music_api_models" placeholder="MODEL_A,MODEL_B">
                        </label>
                        <label class="wide-field">
                            <span>打断提示</span>
                            <input name="interrupt_tts_hint_text">
                        </label>
                    </div>
                    <div class="toggle-grid">
                        <label class="toggle-line"><input name="conversation_monitor_enabled" type="checkbox"><span>对话监听</span></label>
                        <label class="toggle-line"><input name="voice_command_enabled" type="checkbox"><span>语音口令</span></label>
                        <label class="toggle-line"><input name="scheduled_tasks_enabled" type="checkbox"><span>定时任务</span></label>
                        <label class="toggle-line"><input name="force_mp3" type="checkbox"><span>强制 MP3</span></label>
                        <label class="toggle-line"><input name="external_search_enabled" type="checkbox"><span>外部搜索</span></label>
                        <label class="toggle-line"><input name="indicator_light_enabled" type="checkbox"><span>保留灯效</span></label>
                        <label class="toggle-line"><input name="interrupt_tts_hint_enabled" type="checkbox"><span>搜索提示</span></label>
                    </div>
                    <fieldset>
                        <legend>AI</legend>
                        <div class="control-grid">
                            <label class="toggle-line"><input name="ai_enabled" type="checkbox"><span>启用</span></label>
                            <label class="wide-field"><span>API URL</span><input name="ai_api_url" type="url"></label>
                            <label><span>Model</span><input name="ai_model"></label>
                            <label><span>Timeout</span><input name="ai_timeout" type="number" min="1" max="120"></label>
                            <label class="wide-field"><span>API Key</span><input name="ai_api_key" type="password"></label>
                        </div>
                    </fieldset>
                    <div class="inline-actions">
                        <button class="primary-button" type="submit">保存设置</button>
                        <span data-role="config-state">未加载</span>
                    </div>
                </form>
            </section>

            <footer class="mini-player" id="miniPlayer"></footer>
        </main>
        <nav class="bottom-tabs" id="bottomTabs"></nav>
    </div>
    <script type="module" src="static/js/app.js"></script>
</body>
</html>
